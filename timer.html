<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <input type="number" id="hour" placeholder=" Set Hour">
  <input type="number" id="mins" placeholder="Set Minutes">
  <input type="number" id="seconds" placeholder="Set Seconds">
  <button class="btn btn-success" onclick="startBtn()">Start the Timer</button>
  <button class="btn btn-primary" onclick="stopBtn()">Stop/Pause the Timer</button>



  <script>
    let interval;
    const startBtn = () => {
      let hourInput = document.getElementById('hour')
      let minInput = document.getElementById('mins').value;
      let secInput = document.getElementById('seconds').value;

      if (!interval){
        interval = setInterval(() => {
          hourInput.value = parseFloat(hourInput.value) - 1

        }, 1000);

      }

    }
    const stopBtn = () => {
      clearInterval(interval)
      interval = null
    }
  </script>
</body>

</html>
